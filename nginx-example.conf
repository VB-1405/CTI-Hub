# nginx-example.conf
# ─────────────────────────────────────────────────────────────────
# Example Nginx reverse proxy config for CTI Hub
# Place in /etc/nginx/sites-available/cti-hub
#
# This exposes CTI Hub at /cti/ and optionally proxies Kibana at /kibana/
# Both are accessible from either local or Tailscale IPs.
# ─────────────────────────────────────────────────────────────────

server {
    listen 80 default_server;
    server_name _;   # responds on ALL IPs (Tailscale + local)

    gzip on;
    gzip_types text/html text/css application/javascript application/json;

    # ── CTI Hub ────────────────────────────────────────────────
    location /cti/ {
        proxy_pass         http://127.0.0.1:5000/;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;

        # Allow large file uploads for CAPA
        client_max_body_size 35M;

        # Long timeout for CAPA analysis
        proxy_read_timeout 360s;
        proxy_send_timeout 360s;
    }

    # ── Optional: Kibana ───────────────────────────────────────
    # Uncomment if you want Kibana at /kibana/
    # Also add to kibana.yml:
    #   server.basePath: "/kibana"
    #   server.rewriteBasePath: true
    #
    # location /kibana/ {
    #     proxy_pass         http://127.0.0.1:5601/;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Host              $host;
    #     proxy_set_header   Upgrade           $http_upgrade;
    #     proxy_set_header   Connection        "upgrade";
    #     proxy_buffering    off;
    # }

    location = / {
        return 302 /cti/;
    }
}
