<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTI Hub — Initial Setup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #111111; --border: #222222; --border2: #2a2a2a;
    --accent: #00d4ff; --accent-d: #0099bb; --error: #ff4444; --warn: #ffaa00;
    --text: #e0e0e0; --text-dim: #666666; --text-mid: #999999;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px), linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);
    background-size: 32px 32px; pointer-events: none;
  }
  .container { width: 100%; max-width: 420px; position: relative; z-index: 1; }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; }
  .logo-mark { width: 36px; height: 36px; border: 1.5px solid var(--accent); display: flex; align-items: center; justify-content: center; }
  .logo-mark svg { width: 16px; height: 16px; fill: var(--accent); }
  .logo-text { font-family: var(--mono); font-size: 1rem; font-weight: 500; letter-spacing: 0.15em; }
  .logo-sub { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.2em; color: var(--text-dim); margin-top: 2px; }

  .setup-notice {
    border: 1px solid var(--warn);
    background: rgba(255,170,0,0.05);
    padding: 0.85rem 1rem;
    margin-bottom: 1.5rem;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--warn);
    letter-spacing: 0.05em;
  }

  .card { background: var(--surface); border: 1px solid var(--border); padding: 2rem; }
  .card-title { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 0.5rem; font-family: var(--mono); }
  .card-desc { font-size: 0.82rem; color: var(--text-mid); margin-bottom: 1.75rem; line-height: 1.5; }
  .field { margin-bottom: 1.25rem; }
  label { display: block; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.08em; color: var(--text-mid); margin-bottom: 0.5rem; font-family: var(--mono); }
  input { width: 100%; background: var(--bg); border: 1px solid var(--border2); padding: 0.7rem 0.85rem; color: var(--text); font-family: var(--mono); font-size: 0.88rem; outline: none; transition: border-color 0.15s; }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text-dim); }
  .hint { font-family: var(--mono); font-size: 0.65rem; color: var(--text-dim); margin-top: 0.4rem; }
  .btn { width: 100%; padding: 0.8rem; background: var(--accent); border: none; color: #000; font-family: var(--mono); font-size: 0.78rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: background 0.15s; margin-top: 0.5rem; }
  .btn:hover { background: var(--accent-d); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .error-msg { font-family: var(--mono); font-size: 0.72rem; color: var(--error); margin-bottom: 1rem; padding: 0.6rem 0.75rem; border-left: 2px solid var(--error); background: rgba(255,68,68,0.06); display: none; }
  .error-msg.show { display: block; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16"><path d="M8 1L14 4.5V11.5L8 15L2 11.5V4.5L8 1Z"/></svg>
    </div>
    <div>
      <div class="logo-text">CTI HUB</div>
      <div class="logo-sub">Initial Setup</div>
    </div>
  </div>

  <div class="setup-notice">
    ⚠ FIRST RUN DETECTED — Create your administrator account
  </div>

  <div class="card">
    <div class="card-title">Create Admin Account</div>
    <div class="card-desc">This account will have full access to API management, user management, and all system settings. This page is only accessible once.</div>

    <div class="error-msg" id="errorMsg"></div>

    <form id="setupForm" onsubmit="handleSetup(event)">
      <div class="field">
        <label>Username</label>
        <input type="text" id="username" placeholder="admin" autocapitalize="none" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Minimum 8 characters" required>
        <div class="hint">Use a strong password — this is your only admin account</div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirm" placeholder="Repeat password" required>
      </div>
      <button type="submit" class="btn" id="submitBtn">Create Admin Account</button>
    </form>
  </div>
</div>

<script>
  // If setup already done, redirect
  fetch('/api/auth/setup-status')
    .then(r => r.json())
    .then(d => { if (!d.needs_setup) window.location.href = '/login'; });

  async function handleSetup(e) {
    e.preventDefault();
    const errorMsg = document.getElementById('errorMsg');
    const btn = document.getElementById('submitBtn');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;

    errorMsg.classList.remove('show');

    if (password !== confirm) {
      errorMsg.textContent = 'Passwords do not match';
      errorMsg.classList.add('show');
      return;
    }
    if (password.length < 8) {
      errorMsg.textContent = 'Password must be at least 8 characters';
      errorMsg.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating account...';

    try {
      const r = await fetch('/api/auth/setup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await r.json();
      if (!r.ok) {
        errorMsg.textContent = data.error || 'Setup failed';
        errorMsg.classList.add('show');
        return;
      }
      localStorage.setItem('cti_token', data.token);
      localStorage.setItem('cti_username', data.username);
      localStorage.setItem('cti_role', data.role);
      window.location.href = '/';
    } catch(err) {
      errorMsg.textContent = 'Connection error';
      errorMsg.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Admin Account';
    }
  }
</script>
</body>
</html>
