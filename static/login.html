<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTI Hub — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0a0a;
    --surface:  #111111;
    --border:   #222222;
    --border2:  #2a2a2a;
    --accent:   #00d4ff;
    --accent-d: #0099bb;
    --error:    #ff4444;
    --text:     #e0e0e0;
    --text-dim: #666666;
    --text-mid: #999999;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'IBM Plex Sans', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 1rem;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 380px;
    position: relative;
    z-index: 1;
  }

  /* Logo */
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 2.5rem;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    border: 1.5px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-mark svg {
    width: 16px;
    height: 16px;
    fill: var(--accent);
  }

  .logo-text {
    font-family: var(--mono);
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    color: var(--text);
  }

  .logo-sub {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    margin-top: 2px;
    text-transform: uppercase;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2rem;
  }

  .card-title {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 1.75rem;
    font-family: var(--mono);
  }

  /* Form */
  .field {
    margin-bottom: 1.25rem;
  }

  label {
    display: block;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text-mid);
    margin-bottom: 0.5rem;
    font-family: var(--mono);
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    padding: 0.7rem 0.85rem;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  input:focus {
    border-color: var(--accent);
  }

  input::placeholder {
    color: var(--text-dim);
  }

  /* Submit */
  .btn {
    width: 100%;
    padding: 0.8rem;
    background: var(--accent);
    border: none;
    color: #000;
    font-family: var(--mono);
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    margin-top: 0.5rem;
  }

  .btn:hover { background: var(--accent-d); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Error */
  .error-msg {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--error);
    margin-bottom: 1rem;
    padding: 0.6rem 0.75rem;
    border-left: 2px solid var(--error);
    background: rgba(255,68,68,0.06);
    display: none;
  }
  .error-msg.show { display: block; }

  /* Loading state */
  .btn-text { display: inline; }
  .btn-loading { display: none; }
  .btn.loading .btn-text { display: none; }
  .btn.loading .btn-loading { display: inline; }

  /* Footer */
  .footer {
    margin-top: 1.5rem;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    text-align: center;
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #00cc66;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<div class="container">

  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 1L14 4.5V11.5L8 15L2 11.5V4.5L8 1Z"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">CTI HUB</div>
      <div class="logo-sub">Threat Intelligence Platform</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Sign in to continue</div>

    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="field">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter username"
          autocomplete="username"
          autocapitalize="none"
          required
        >
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter password"
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" class="btn" id="submitBtn">
        <span class="btn-text">Sign In</span>
        <span class="btn-loading">Authenticating...</span>
      </button>
    </form>
  </div>

  <div class="footer">
    <span class="status-dot"></span>
    System operational &nbsp;·&nbsp; CTI Hub v2.0
  </div>

</div>

<script>
  // Redirect if already logged in
  const token = localStorage.getItem('cti_token');
  if (token) {
    fetch('/api/auth/me', {
      headers: { 'Authorization': `Bearer ${token}` }
    }).then(r => {
      if (r.ok) window.location.href = '/';
    }).catch(() => {});
  }

  // Check if setup is needed
  fetch('/api/auth/setup-status')
    .then(r => r.json())
    .then(d => {
      if (d.needs_setup) window.location.href = '/setup';
    });

  async function handleLogin(e) {
    e.preventDefault();
    const btn      = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.classList.add('loading');
    errorMsg.classList.remove('show');

    try {
      const r = await fetch('/api/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username, password }),
      });

      const data = await r.json();

      if (!r.ok) {
        errorMsg.textContent = data.error || 'Login failed';
        errorMsg.classList.add('show');
        return;
      }

      localStorage.setItem('cti_token',    data.token);
      localStorage.setItem('cti_username', data.username);
      localStorage.setItem('cti_role',     data.role);

      window.location.href = '/';

    } catch (err) {
      errorMsg.textContent = 'Connection error — is the server running?';
      errorMsg.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }
</script>
</body>
</html>
